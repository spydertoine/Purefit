<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur de Calories | PureFit</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='index.html'">Pure<span>Fit</span></div>
        <div class="menu-burger" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Accueil</a></li>
            <li><a href="programmes.html">Programmes</a></li>
            <li><a href="savoir.html">Savoir</a></li>
            <li><a href="nutrition.html">Nutrition</a></li>
        </ul>
    </nav>

    <main class="container">
        <header class="hero">
            <h1>Calculateur de <span>Besoins</span></h1>
            <p style="color: #86868b;">Définis tes objectifs avec précision scientifique.</p>
        </header>

        <section class="calc-section">
            <div class="calc-card">
                <form id="calorie-form">
                    <div class="input-group">
                        <label>Genre</label>
                        <select id="gender">
                            <option value="male">Homme</option>
                            <option value="female">Femme</option>
                        </select>
                    </div>

                    <div class="input-grid">
                        <div class="input-group">
                            <label>Poids (kg)</label>
                            <input type="number" id="weight" placeholder="Ex: 75" required>
                        </div>
                        <div class="input-group">
                            <label>Taille (cm)</label>
                            <input type="number" id="height" placeholder="Ex: 180" required>
                        </div>
                        <div class="input-group">
                            <label>Âge</label>
                            <input type="number" id="age" placeholder="Ex: 25" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Niveau d'activité</label>
                        <select id="activity">
                            <option value="1.2">Sédentaire (Bureau, peu de sport)</option>
                            <option value="1.375">Légèrement actif (1-2 séances/sem)</option>
                            <option value="1.55">Modérément actif (3-4 séances/sem)</option>
                            <option value="1.725">Très actif (5+ séances/sem)</option>
                        </select>
                    </div>

                    <button type="submit" class="calc-btn">Calculer mes besoins</button>
                </form>

                <div id="results" class="results-area" style="display: none;">
                    <hr>
                    <h3>Tes besoins journaliers :</h3>
                    <div class="res-grid">
                        <div class="res-box">
                            <small>Maintien</small>
                            <span id="res-maintien">0</span> kcal
                        </div>
                        <div class="res-box loss">
                            <small>Perte (-400)</small>
                            <span id="res-loss">0</span> kcal
                        </div>
                        <div class="res-box gain">
                            <small>Prise (+300)</small>
                            <span id="res-gain">0</span> kcal
                        </div>
                    </div>

                    <h3 style="margin-top: 30px;">Répartition des Macros (Maintien) :</h3>
                    <div class="res-grid macros-grid">
                        <div class="res-box prot">
                            <small>Protéines</small>
                            <span id="res-prot">0</span>g
                        </div>
                        <div class="res-box lip">
                            <small>Lipides</small>
                            <span id="res-lip">0</span>g
                        </div>
                        <div class="res-box glu">
                            <small>Glucides</small>
                            <span id="res-glu">0</span>g
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
